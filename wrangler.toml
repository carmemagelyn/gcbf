name = "gcbf-church-portal"
main = "worker.js"
compatibility_date = "2024-09-02"

[[d1_databases]]
binding = "DB"
database_name = "gcbf_church_db"
database_id = "ee5ba803-39cf-40a4-80f6-b369a2d6a9da"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "gcbf-files"

[build]
command = "npm run build"
cwd = "./"

[build.upload]
format = "service-worker"
